# Continuous Integration (CI) Workflow

on:
  push:
    branches:
      - main
      - ci/*
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6

      - name: setup go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: 'go.sum'

      - name: run gofmt
        run: |
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then
            echo "$out"
            echo "gofmt failed... re-run on local ya goof"
            exit 1
          fi

      - name: run vet
        run: go vet ./...

  test:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6

      - name: setup go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: 'go.sum'

      - run: |
          go version
          go mod download

      - name: run tests
        run: |
          go test -v -coverprofile=coverage.out -covermode=atomic ./...
          go tool cover -func=coverage.out
          go tool cover -html=coverage.out -o coverage.html

      - name: upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.html
          retention-days: 7